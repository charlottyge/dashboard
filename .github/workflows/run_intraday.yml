name: Run intraday dashboard

on:
  schedule:
    # Beijing time: 09:25, 09:45, 10:30, 11:20, 13:30, 14:30, 15:10
    - cron: "25 1 * * 1-5"
    - cron: "45 1 * * 1-5"
    - cron: "30 2 * * 1-5"
    - cron: "20 3 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "10 7 * * 1-5"
  workflow_dispatch:
    inputs:
      checkpoint:
        description: "Checkpoint to run"
        required: true
        default: "10:30"
        type: choice
        options:
          - "09:25"
          - "09:45"
          - "10:30"
          - "11:20"
          - "13:30"
          - "14:30"
          - "15:10"
      strategy:
        description: "Run strategy package only"
        required: true
        default: false
        type: boolean
      report_date:
        description: "Report date, leave blank for today"
        required: false
        default: ""
      limit:
        description: "Optional symbol limit for testing, 0 means full scan"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare cached watchlist and portfolio
        run: python3 a_share_research_toolkit/scripts/prepare_cloud_inputs.py

      - name: Resolve run parameters
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHECKPOINT: ${{ inputs.checkpoint }}
          INPUT_STRATEGY: ${{ inputs.strategy }}
          INPUT_DATE: ${{ inputs.report_date }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CHECKPOINT="${INPUT_CHECKPOINT:-10:30}"
            STRATEGY="${INPUT_STRATEGY:-false}"
            REPORT_DATE="$INPUT_DATE"
            LIMIT="${INPUT_LIMIT:-0}"
          else
            STRATEGY="false"
            REPORT_DATE=""
            LIMIT="0"
            HM="$(TZ=Asia/Shanghai date +%H%M)"
            if [ "$HM" -lt 940 ]; then
              CHECKPOINT="09:25"
            elif [ "$HM" -lt 1015 ]; then
              CHECKPOINT="09:45"
            elif [ "$HM" -lt 1100 ]; then
              CHECKPOINT="10:30"
            elif [ "$HM" -lt 1230 ]; then
              CHECKPOINT="11:20"
            elif [ "$HM" -lt 1400 ]; then
              CHECKPOINT="13:30"
            elif [ "$HM" -lt 1500 ]; then
              CHECKPOINT="14:30"
            else
              CHECKPOINT="15:10"
            fi
          fi
          echo "RUN_CHECKPOINT=$CHECKPOINT" >> "$GITHUB_ENV"
          echo "RUN_STRATEGY=$STRATEGY" >> "$GITHUB_ENV"
          echo "RUN_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "RUN_LIMIT=$LIMIT" >> "$GITHUB_ENV"
          echo "Resolved checkpoint=$CHECKPOINT strategy=$STRATEGY date=$REPORT_DATE limit=$LIMIT"

      - name: Run checkpoint and publish
        run: |
          DATE_ARG=""
          if [ -n "$RUN_DATE" ]; then
            DATE_ARG="--date $RUN_DATE"
          fi
          LIMIT_ARG=""
          if [ "$RUN_LIMIT" != "0" ] && [ -n "$RUN_LIMIT" ]; then
            LIMIT_ARG="--limit $RUN_LIMIT"
          fi
          if [ "$RUN_STRATEGY" = "true" ]; then
            python3 a_share_research_toolkit/scripts/run_intraday_and_publish.py --strategy $DATE_ARG $LIMIT_ARG --no-push
          else
            python3 a_share_research_toolkit/scripts/run_intraday_and_publish.py --checkpoint "$RUN_CHECKPOINT" $DATE_ARG $LIMIT_ARG --no-push
          fi

      - name: Push dashboard update
        run: git push origin main
