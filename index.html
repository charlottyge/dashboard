<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A 股盘中分析雷达</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-sector-layout" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <strong>A 股盘中雷达</strong>
        <span id="generated-at">读取中</span>
      </div>
      <label class="date-picker">
        交易日
        <select id="date-select"></select>
      </label>
      <nav id="app-nav" class="side-nav">
        <button class="view-tab active" data-view="radar">盘中雷达</button>
        <button class="view-tab" data-view="tables">数据表</button>
        <button class="view-tab" data-view="markdown">Markdown</button>
        <button class="view-tab" data-view="weekly">周度雷达</button>
        <button class="view-tab" data-view="files">导出文件</button>
      </nav>
      <div class="cloud-runner">
        <strong>云端运行</strong>
        <span>电脑关机时，在 GitHub Actions 里运行扫描。</span>
        <a
          class="cloud-run-button"
          href="https://github.com/charlottyge/dashboard/actions/workflows/run_intraday.yml"
          target="_blank"
          rel="noreferrer"
        >打开运行按钮</a>
      </div>
      <p class="sidebar-note">研究辅助工具，不构成投资建议。</p>
    </aside>

    <main class="content">
      <section id="timeline" class="section app-view active" data-view-panel="radar">
        <div class="section-title">
          <div>
            <h2>盘中时间轴</h2>
            <p id="timeline-subtitle">按时间点展开每次扫描的分析结果。</p>
          </div>
        </div>
        <div id="checkpoint-tabs" class="checkpoint-tabs"></div>
        <div id="checkpoint-detail" class="checkpoint-detail"></div>
      </section>

      <section id="tables" class="section app-view" data-view-panel="tables">
        <div class="section-title">
          <div>
            <h2>数据表</h2>
            <p id="tables-subtitle">当前 checkpoint 的原始输出表。</p>
          </div>
        </div>
        <div id="checkpoint-tables" class="table-stack"></div>
      </section>

      <section id="markdown" class="section app-view" data-view-panel="markdown">
        <div class="section-title">
          <div>
            <h2>Markdown 管理</h2>
            <p>在当前浏览器创建、编辑和下载 Markdown 笔记。</p>
          </div>
          <button id="new-markdown" class="button">新建 Markdown</button>
        </div>
        <div class="markdown-layout">
          <div id="markdown-list" class="markdown-list"></div>
          <form id="markdown-form" class="markdown-editor">
            <input id="markdown-id" type="hidden" />
            <input id="markdown-title" placeholder="标题" />
            <textarea id="markdown-body" placeholder="正文，支持 Markdown"></textarea>
            <div class="editor-actions">
              <button class="button" type="submit">保存</button>
              <button id="download-markdown" class="button ghost" type="button">下载 .md</button>
              <button id="delete-markdown" class="button danger" type="button">删除</button>
            </div>
          </form>
        </div>
      </section>

      <section id="weekly" class="section app-view" data-view-panel="weekly">
        <div class="section-title">
          <div>
            <h2>周度板块轮动</h2>
            <p id="weekly-meta">读取中</p>
          </div>
          <a id="weekly-link" class="button" href="#" download>下载原始周报</a>
        </div>
        <article id="weekly-preview" class="report-preview"></article>
      </section>

      <section class="section app-view" data-view-panel="files">
        <div class="section-title">
          <div>
            <h2>最近导出文件</h2>
            <p>用于核对数据来源和生成记录。</p>
          </div>
        </div>
        <div id="recent-files" class="file-list"></div>
      </section>
    </main>

    <script src="./app.js?v=20260616-sector-layout"></script>
  </body>
</html>
